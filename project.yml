name: RaceTimer
options:
  bundleIdPrefix: com.racetimerapp
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  RaceTimer:
    type: application
    platform: iOS
    sources:
      - path: RaceTimer
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: RaceTimer
        PRODUCT_BUNDLE_IDENTIFIER: com.racetimerapp.RaceTimer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic

  RaceTimerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RaceTimerTests
    dependencies:
      - target: RaceTimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.racetimerapp.RaceTimerTests
        GENERATE_INFOPLIST_FILE: true
